name: QA Automation Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Newman
      run: npm install -g newman newman-reporter-htmlextra

    - name: Start FastAPI Backend
      run: |
        # In a real environment, you'd want to run uvicorn in background and wait for it
        uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 5
        echo "Backend started"

    - name: Run API Tests (Newman)
      run: |
        echo "Running Newman"
        newman run Cinema_Booking_API.postman_collection.json -r cli,htmlextra --reporter-htmlextra-export reports/newman/report.html

    - name: Run API Tests (Pytest)
      run: |
        echo "Running Pytest"
        pytest tests/

    - name: Verify Database
      run: python scripts/verify-db.py

    - name: Generate QA Artifacts
      run: |
        python scripts/generate_metrics.py
        python scripts/generate_rtm.py

    - name: Upload QA Reports
      uses: actions/upload-artifact@v4
      with:
        name: qa-reports
        path: reports/
